<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8"/>
      <stop offset="100%" style="stop-color:#90e0ef"/>
    </linearGradient>
    <linearGradient id="play" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b4d8"/>
      <stop offset="100%" style="stop-color:#48cae4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- CCC-inspired chaos knot (three interlocking loops) -->
  <g transform="translate(256, 200)" fill="none" stroke="url(#accent)" stroke-width="18" stroke-linecap="round">
    <ellipse cx="0" cy="-45" rx="55" ry="40" transform="rotate(0)"/>
    <ellipse cx="0" cy="-45" rx="55" ry="40" transform="rotate(120)"/>
    <ellipse cx="0" cy="-45" rx="55" ry="40" transform="rotate(240)"/>
  </g>

  <!-- Play triangle in center -->
  <polygon points="243,180 243,220 273,200" fill="url(#play)" opacity="0.9"/>

  <!-- CHAOSFLIX -->
  <text x="256" y="340" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="800" font-size="52" letter-spacing="6" fill="#ffffff">
    CHAOS<tspan fill="url(#accent)">FLIX</tspan>
  </text>

  <!-- Subtitle -->
  <text x="256" y="375" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-weight="400" font-size="18" letter-spacing="3" fill="#90e0ef" opacity="0.7">
    CCC · MEDIA · JELLYFIN
  </text>

  <!-- Decorative line -->
  <line x1="156" y1="390" x2="356" y2="390" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
</svg>
